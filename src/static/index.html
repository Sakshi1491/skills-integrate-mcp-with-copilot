<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>

      <section id="auth-container">
        <h3>Account access</h3>
        <div id="auth-forms">
          <form id="register-form">
            <div class="form-group">
              <label for="register-email">Register Email:</label>
              <input type="email" id="register-email" required placeholder="new-student@mergington.edu" />
            </div>
            <div class="form-group">
              <label for="register-password">Password:</label>
              <input type="password" id="register-password" required placeholder="Choose a password" />
            </div>
            <button type="submit">Register</button>
          </form>

          <form id="login-form">
            <div class="form-group">
              <label for="login-email">Login Email:</label>
              <input type="email" id="login-email" required placeholder="your-email@mergington.edu" />
            </div>
            <div class="form-group">
              <label for="login-password">Password:</label>
              <input type="password" id="login-password" required placeholder="Enter your password" />
            </div>
            <button type="submit">Login</button>
          </form>
        </div>
        <div id="auth-status" class="hidden message"></div>
      </section>

      <section id="qna-container" class="hidden">
        <h3>Ask a question</h3>
        <p id="current-user"></p>
        <form id="qna-form">
          <div class="form-group">
            <label for="question">Question:</label>
            <input type="text" id="question" required placeholder="Ask a question about activities or signup" />
          </div>
          <button type="submit">Submit Question</button>
        </form>
        <div id="qna-message" class="hidden message"></div>
        <div id="questions-list">
          <h4>Questions</h4>
          <ul id="questions"></ul>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
